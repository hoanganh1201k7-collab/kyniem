        ];

        let currentPin = "";
        let wrongCount = 0;
        let songIndex = 0;
        let typingTimeout;

        let flowerInterval;

        const mainAudio = document.getElementById('mainAudio');
        const playBtn = document.getElementById('play-btn');
        const cdThumb = document.getElementById('cd-thumb');
        const songTitle = document.getElementById('song-title');
        const progress = document.getElementById('progress');
        const currentTimeDisplay = document.getElementById('current-time');
        const durationTimeDisplay = document.getElementById('duration-time');

        function formatTime(seconds) {
            let min = Math.floor(seconds / 60);
            let sec = Math.floor(seconds % 60);
            if (sec < 10) sec = `0${sec}`;
            return `${min}:${sec}`;
        }

        function loadSong(index) {
            mainAudio.src = songs[index].src;
            songTitle.innerText = songs[index].title;
            cdThumb.style.backgroundImage = `url('${songs[index].img}')`;
            progress.value = 0;
            progress.style.backgroundSize = '0% 100%';
            mainAudio.onended = function() { nextSong(); };
            renderPlaylist();
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: songs[index].title,
                    artist: 'Cẩm Lê - Kỷ Niệm', 
                    album: 'Our Memories',
                    artwork: [
                        { src: songs[index].img, sizes: '512x512', type: 'image/png' }
                    ]
                });
            }
        }

        mainAudio.ontimeupdate = function() {
            if (mainAudio.duration) {
                const progressPercent = Math.floor(mainAudio.currentTime / mainAudio.duration * 100);
                progress.value = progressPercent;
                progress.style.backgroundSize = progressPercent + '% 100%';
                currentTimeDisplay.innerText = formatTime(mainAudio.currentTime);
                durationTimeDisplay.innerText = formatTime(mainAudio.duration);
            }
        };

        progress.oninput = function(e) {
            const seekTime = (mainAudio.duration / 100) * e.target.value;
            mainAudio.currentTime = seekTime;
        };

        mainAudio.onended = function() { nextSong(); };

        function togglePlay() { isPlaying ? pauseSong() : playSong(); }
        function playSong() { isPlaying = true; mainAudio.play(); playBtn.innerText = "⏸"; cdThumb.style.animationPlayState = "running"; }
        function pauseSong() { isPlaying = false; mainAudio.pause(); playBtn.innerText = "▶"; cdThumb.style.animationPlayState = "paused"; }
        function nextSong() { songIndex = (songIndex + 1) % songs.length; loadSong(songIndex); playSong(); }
        function prevSong() { songIndex = (songIndex - 1 + songs.length) % songs.length; loadSong(songIndex); playSong(); }
        function selectSong(index) { songIndex = index; loadSong(index); playSong(); }

        function renderPlaylist() {
            const playlist = document.getElementById('playlist');
            playlist.innerHTML = songs.map((song, i) => `
                <div class="playlist-item ${i === songIndex ? 'active' : ''}" onclick="selectSong(${i})">
                    <img src="${song.img}">
                    <span>${song.title}</span>
                </div>
            `).join('');
        }

        function press(num) {
            const clickBtn = document.getElementById('clickSound');
            clickBtn.currentTime = 0; 
            clickBtn.play();
            if (currentPin.length < 6) {
                currentPin += num;
                updateDots();
                if (currentPin.length === 6) setTimeout(checkPin, 300);
            }
        }
        function del() { 
            const clickBtn = document.getElementById('clickSound');
            clickBtn.currentTime = 0;
            clickBtn.play();
            currentPin = currentPin.slice(0, -1); 
            updateDots(); 
        }
        function updateDots() {
            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, i) => i < currentPin.length ? dot.classList.add('active') : dot.classList.remove('active'));
        }

        function checkPin() {
            const card = document.querySelector('.card');
            const memeOverlay = document.getElementById('meme-overlay');
            const soundIds = ['wrong1', 'wrong2', 'wrong3']; 
            
            if (currentPin === CORRECT_PIN) {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('menu-screen').style.display = 'grid';
                loadSong(songIndex);
            } else {
                const errSound = document.getElementById(soundIds[wrongCount % soundIds.length]);
                if (errSound) errSound.play();
                
                wrongCount++;
                card.classList.add('shake');
                memeOverlay.style.display = 'flex';
                setTimeout(() => { 
                    memeOverlay.style.display = 'none'; 
                    card.classList.remove('shake'); 
                    currentPin = ""; 
                    updateDots(); 
                }, 5500);
            }
        }

        function openMusicPlayer() { document.getElementById('menu-screen').style.display = 'none'; document.getElementById('music-player').style.display = 'block'; }
        function closeMusicPlayer() { document.getElementById('music-player').style.display = 'none'; document.getElementById('menu-screen').style.display = 'grid'; }

        function startAnniversary() { 
            document.getElementById('menu-screen').style.display = 'none'; 
            playlistCurrentTime = mainAudio.currentTime;
            wasPlayingBeforeAnniversary = isPlaying;
            mainAudio.src = "nhac/Nhac-nen.mp3"; 
            songTitle.innerText = "Dành cho bíe ❤️";
            mainAudio.onended = null;
            playSong();
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: "Dành cho bíe ❤️",
                    artist: "Kỷ niệm 1 năm",
                    artwork: [{ src: "anh/ChatGPT Image 14_27_48 31 thg 12, 2025.png", sizes: "512x512", type: "image/jpeg" }] 
                });
            } 
            runPhotoSlider(); 
        }

        function runPhotoSlider() {
            const slider = document.getElementById('photo-slider');
            const track = document.getElementById('track');
            track.style.transition = 'none';
            track.style.transform = 'translateX(0)'; 
            slider.style.display = 'flex';
            setTimeout(() => {
                track.style.transition = 'transform 18s linear'; 
                track.style.transform = `translateX(-${track.offsetWidth + window.innerWidth}px)`;
            }, 100);
            setTimeout(() => {
                slider.style.display = 'none';
                mainAudio.volume = 0.3; 
                showLetter();
            }, 18500); 
        }

        function showLetter() {
            document.getElementById('letter-screen').style.display = 'block';
            document.getElementById("typewriter").innerHTML = "";
            clearTimeout(typingTimeout); 
            let i = 0;
            function type() { 
                if (i < letterMessage.length) { 
                    document.getElementById("typewriter").innerHTML += letterMessage.charAt(i++); 
                    typingTimeout = setTimeout(type, 50); 
                } 
            }
            type();
        }

        function backToMenu() { 
            document.getElementById('letter-screen').style.display = 'none'; 
            document.getElementById('menu-screen').style.display = 'grid'; 
            clearTimeout(typingTimeout);
            document.getElementById("typewriter").innerHTML = ""; 
            loadSong(songIndex);
            mainAudio.onloadedmetadata = function() {
                mainAudio.currentTime = playlistCurrentTime; 
                if (wasPlayingBeforeAnniversary) {
                    playSong();
                } else {
                    pauseSong(); 
                }
                mainAudio.volume = 1.0;
                mainAudio.onloadedmetadata = null;
            };
        }

        function start83() { 
            document.getElementById('menu-screen').style.display = 'none'; 
            document.getElementById('flower-garden').style.display = 'flex'; 
            document.getElementById('flower-wish').innerText = wishes83; 
            document.getElementById('flower-container').innerHTML = '';
            document.getElementById('audio83').volume = 1.0;
            flowerInterval = setInterval(createSingleFlower, 300); 
        }
        function playVoice83() {
            const audio83 = document.getElementById('audio83');
            const icon = document.getElementById('voiceIcon83');
            const mainAudio = document.getElementById('mainAudio');
            audio83.volume = 1.0;
            if (audio83.paused) {
                audio83.play();
                icon.innerText = "⏸ Cảm động khum🥹"; 
                mainAudio.volume = 0.1;
            } else {
                audio83.pause();
                icon.innerText = "▶ Em nghe đi cho tuiii😠";
                mainAudio.volume = 1.0;
            }
        }
        function closeGarden() { 
          clearInterval(flowerInterval);
          document.getElementById('flower-garden').style.display = 'none'; 
          document.getElementById('menu-screen').style.display = 'grid'; 
          const audio83 = document.getElementById('audio83');
          audio83.pause();
          audio83.currentTime = 0; 
          document.getElementById('voiceIcon83').innerText = "▶ Em nghe đi cho tuiii😠";
          document.getElementById('mainAudio').volume = 1.0;
          document.getElementById('flower-garden').style.display = 'none'; 
          document.getElementById('menu-screen').style.display = 'grid';
        }
        function createSingleFlower() {
            const container = document.getElementById('flower-container');
            const icons = ['🌸', '🌹', '🌺', '🌷'];
            const f = document.createElement('div'); 
            
            f.classList.add('flower'); 
            f.innerHTML = icons[Math.floor(Math.random() * icons.length)];
            f.style.left = Math.random() * 100 + 'vw'; 
            f.style.animationDuration = (Math.random() * 3 + 2) + 's';
            f.style.fontSize = (Math.random() * 20 + 20) + 'px'; 
            container.appendChild(f);
            setTimeout(() => f.remove(), 5000);
        }

        setInterval(() => {
            const h = document.createElement('div'); h.classList.add('heart'); h.innerHTML = Math.random() > 0.5 ? '❤️' : '💗';
            h.style.left = Math.random() * 100 + 'vw'; h.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.getElementById('heart-container').appendChild(h); setTimeout(() => h.remove(), 5000);
        }, 350);

        function updateTimer() {
            const diff = Math.abs(new Date() - startDate);
            document.getElementById('days').innerText = Math.floor(diff / 86400000);
            document.getElementById('hours').innerText = Math.floor((diff / 3600000) % 24);
            document.getElementById('minutes').innerText = Math.floor((diff / 60000) % 60);
            document.getElementById('seconds').innerText = Math.floor((diff / 1000) % 60);
        }
        setInterval(updateTimer, 1000); updateTimer();
        let wasPlayingBeforeGift = false; 
        function openFlowerGift() {
            const modal = document.getElementById('flowerModal');
            modal.style.display = 'flex';
            wasPlayingBeforeGift = isPlaying; 
            if (isPlaying) {
                pauseSong();
            }
        }

        function closeFlowerGift() {
            const modal = document.getElementById('flowerModal');
            modal.style.display = 'none';
            const iframe = document.querySelector('.gift-iframe');
            const src = iframe.src;
            iframe.src = ''; 
            iframe.src = src;
            if (wasPlayingBeforeGift) {
                playSong();
            }
        }
       
        window.onclick = function(event) {
            const modal = document.getElementById('flowerModal');
            if (event.target == modal) {
                closeFlowerGift();
            }
        }
        document.getElementById('audio83').onended = function() {
            document.getElementById('voiceIcon83').innerText = "▶ Em nghe đi cho tuiii😠";
            document.getElementById('mainAudio').volume = 1.0;
        };
    </script>
</body>
</html>
